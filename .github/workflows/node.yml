name: Build

on: [ push, pull_request ]

env:
  DISCORD_BOT_TOKEN: MOCK_DISCORD_BOT_TOKEN
  DISCORD_CLIENT_ID: MOCK_DISCORD_CLIENT_ID
  TELEGRAM_BOT_TOKEN: MOCK_TELEGRAM_BOT_TOKEN

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: 'Building, Linting and Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Upgrade NPM
        run: npm install -g npm

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Prepare .env
        run: |
          cp .env.example .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Start built-in PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo systemctl status postgresql.service
          sudo -u postgres psql -c "CREATE DATABASE fantastick;"
          sudo -u postgres psql -c "CREATE DATABASE fantastick_shadow;"
          sudo -u postgres psql -c "CREATE USER username PASSWORD 'password' SUPERUSER;"

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm run test
